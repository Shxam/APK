<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Paths for circular text -->
    <path id="topTextPath" d="M 35 100 A 65 65 0 0 1 165 100" fill="none" />
    <path id="bottomTextPath" d="M 165 100 A 65 65 0 0 1 35 100" fill="none" />
    
    <!-- Gradients -->
    <radialGradient id="fireGrad" cx="50%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#FFE600" />
      <stop offset="40%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#9E0000" />
    </radialGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF099" />
      <stop offset="50%" stop-color="#FFB800" />
      <stop offset="100%" stop-color="#CC9300" />
    </linearGradient>

    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8A33" />
      <stop offset="100%" stop-color="#FF5100" />
    </linearGradient>
  </defs>

  <!-- Outer Navy Blue Ring Background -->
  <circle cx="100" cy="100" r="95" fill="#1a2b4a" stroke="#FFB800" stroke-width="3" />
  <circle cx="100" cy="100" r="78" fill="none" stroke="#FFB800" stroke-width="1.5" stroke-dasharray="4 3" />

  <!-- Inner Fire Circle -->
  <circle cx="100" cy="100" r="62" fill="url(#fireGrad)" stroke="#FFB800" stroke-width="2" />

  <!-- Flames Details (Procedural Shapes) -->
  <path d="M 60 120 Q 75 80 85 95 Q 95 65 105 90 Q 115 55 125 92 Q 135 75 142 120 Z" fill="#FFE600" opacity="0.3" />
  <path d="M 70 120 Q 80 90 90 102 Q 100 78 110 100 Q 120 70 130 120 Z" fill="#FFB800" opacity="0.4" />

  <!-- Pitch Brown Field at Bottom -->
  <path d="M 42 120 A 62 62 0 0 0 158 120 Z" fill="#6B4B32" stroke="#4D3321" stroke-width="1" />
  
  <!-- Food Pot & Flatbread Illustration (Left & Right inside field) -->
  <!-- Handi (Left) -->
  <ellipse cx="65" cy="135" rx="10" ry="7" fill="#8C583A" stroke="#331A0D" stroke-width="1" />
  <path d="M 55 135 Q 65 142 75 135 Q 75 146 65 146 Q 55 146 55 135 Z" fill="#734326" />
  <ellipse cx="65" cy="131" rx="8" ry="2" fill="#E6A817" />
  <!-- Flatbreads / Roti (Right) -->
  <ellipse cx="130" cy="140" rx="12" ry="5" fill="#E6C594" stroke="#A68453" stroke-width="1" />
  <ellipse cx="133" cy="137" rx="11" ry="4.5" fill="#F0D9B5" stroke="#A68453" stroke-width="0.8" />
  <circle cx="128" cy="136" r="0.7" fill="#59442D" />
  <circle cx="134" cy="138" r="0.8" fill="#59442D" />
  <circle cx="138" cy="135" r="0.5" fill="#59442D" />

  <!-- Batsman Silhouette (Center) -->
  <g transform="translate(72, 70) scale(0.28)" fill="#FFFFFF">
    <!-- Body & Legs -->
    <path d="M 40 100 L 25 150 L 10 150 L 30 90 L 55 90 L 80 145 L 68 148 L 52 105 Z" />
    <!-- Pad details (White highlights) -->
    <rect x="22" y="115" width="8" height="32" rx="2" fill="#1a2b4a" opacity="0.8" />
    <rect x="65" y="115" width="8" height="32" rx="2" fill="#1a2b4a" opacity="0.8" />
    <!-- Torso -->
    <path d="M 55 90 L 40 50 L 68 45 L 85 80 L 75 92 Z" />
    <!-- Arms and Bat -->
    <!-- Left Arm -->
    <path d="M 42 50 L 20 40 L 15 28 L 38 42 Z" />
    <!-- Right Arm -->
    <path d="M 68 45 L 60 22 L 55 25 L 62 48 Z" />
    <!-- Hands & Grip -->
    <circle cx="17" cy="30" r="3" />
    <!-- Bat -->
    <path d="M 15 32 L -15 -10 L -6 -16 L 20 25 Z" fill="url(#goldGrad)" stroke="#331A0D" stroke-width="1" />
    <rect x="-17" y="-12" width="2" height="3" fill="#9E0000" transform="rotate(-35 -17 -12)" />
    <!-- Helmet / Head -->
    <circle cx="50" cy="32" r="9" />
    <!-- Visor -->
    <path d="M 52 35 L 59 36 L 56 39 Z" fill="#FFB800" />
  </g>

  <!-- Cricket Ball -->
  <circle cx="118" cy="80" r="4.5" fill="#EF4444" stroke="#FFFFFF" stroke-width="0.8" />
  <!-- Ball seam -->
  <path d="M 114.5 80 Q 118 82 121.5 80" fill="none" stroke="#FFFFFF" stroke-width="0.6" stroke-dasharray="1 1" />

  <!-- Circular Texts using SVG paths -->
  <!-- Top Text: IPL -->
  <text font-family="'Yatra One', cursive, serif" font-weight="bold" font-size="20" fill="url(#goldGrad)" text-anchor="middle">
    <textPath href="#topTextPath" startOffset="50%">IPL</textPath>
  </text>

  <!-- Bottom Text: INDIAN PRIME LINE -->
  <text font-family="'Inter', sans-serif" font-weight="bold" font-size="9" fill="#FFFFFF" letter-spacing="1.2" text-anchor="middle">
    <textPath href="#bottomTextPath" startOffset="50%">INDIAN PRIME LINE</textPath>
  </text>

  <!-- Saffron Banner Ribbon at Bottom -->
  <!-- Ribbon folds -->
  <path d="M 22 170 L 35 155 L 35 175 Z" fill="#B32400" />
  <path d="M 178 170 L 165 155 L 165 175 Z" fill="#B32400" />
  <!-- Ribbon body -->
  <path d="M 30 168 L 30 152 Q 100 162 170 152 L 170 168 Q 100 178 30 168 Z" fill="url(#ribbonGrad)" stroke="#FFB800" stroke-width="1" />
  
  <!-- Ribbon text -->
  <text x="100" y="164" font-family="'Inter', sans-serif" font-weight="bold" font-size="7.5" fill="#FFFFFF" letter-spacing="0.5" text-anchor="middle" dominant-baseline="middle">
    TASTY &amp; HEALTHY
  </text>
</svg>
